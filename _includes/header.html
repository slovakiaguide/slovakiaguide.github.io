<header class="site-header">
  <div class="nav-inner">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      <span class="logo-mark">SK</span>
      <span class="logo-text">{{ site.title }}</span>
    </a>

    <form class="site-search" role="search" onsubmit="return false;">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="6" cy="6" r="4.5"></circle>
        <path d="M9.5 9.5L13 13" stroke-linecap="round"></path>
      </svg>
      <input type="search" placeholder="Поиск по гайду — шаги, документы, пошлины…" aria-label="Поиск" />
      <kbd>⌘K</kbd>
    </form>

    <button class="mobile-nav-toggle" aria-label="Открыть меню">Меню</button>
  </div>
</header>
